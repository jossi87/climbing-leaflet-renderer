<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map { margin: 0; height: 100%; width: 100%; background: #fff; }
        .buldre-tooltip { 
            padding: 2px 5px; font-size: 12px; font-weight: bold; 
            background: white; border: 1px solid #444; border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        async function initMap(leaflet, icons) {
            const map = L.map('map', { zoomControl: false, attributionControl: false })
                         .setView(leaflet.defaultCenter, leaflet.defaultZoom);
            const group = L.featureGroup();
            
            const pIcon = L.icon({ iconUrl: icons.parking, iconSize: [24, 24], iconAnchor: [12, 12], shadowUrl: '' });
            const rIcon = L.icon({ iconUrl: icons.rock, iconSize: [24, 24], iconAnchor: [12, 12], shadowUrl: '' });

            (leaflet.markers || []).forEach(m => {
                let icon = m.iconType === 'PARKING' ? pIcon : (m.iconType === 'ROCK' ? rIcon : null);
                
                if (icon) {
                    L.marker([m.lat, m.lng], { icon, shadowPane: null }).addTo(group);
                } else {
                    // FALLBACK: If icon fails, draw a circle so we see SOMETHING
                    L.circleMarker([m.lat, m.lng], { radius: 8, color: 'blue', fillOpacity: 0.8 }).addTo(group);
                }
            });

            (leaflet.outlines || []).forEach(o => {
                const coords = o.polygonCoords.split(';').map(c => c.split(',').map(Number));
                L.polygon(coords, { color: '#3388ff', weight: 3 }).addTo(group);
            });

            (leaflet.slopes || []).forEach(s => {
                const coords = s.slope.coordinates.map(c => [c.latitude, c.longitude]);
                const dist = s.slope.distance;
                if (coords.length > 1) {
                    const line = L.polyline(coords, { color: s.backgroundColor, weight: 5, opacity: 0.9 }).addTo(group);
                    if (dist > 0) {
                        const txt = dist > 1000 ? (dist / 1000).toFixed(1) + " km" : Math.round(dist) + " m";
                        line.bindTooltip(txt, { permanent: true, direction: 'center', className: 'buldre-tooltip' });
                    }
                }
            });

            group.addTo(map);
            if (group.getBounds().isValid()) map.fitBounds(group.getBounds().pad(0.1));

            const tileUrl = leaflet.showPhotoNotMap 
                ? 'https://waapi.webatlas.no/maptiles/tiles/webatlas-orto-newup/wa_grid/{z}/{x}/{y}.jpeg?api_key=b8e36d51-119a-423b-b156-d744d54123d5'
                : 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';

            const tileLayer = L.tileLayer(tileUrl).addTo(map);
            return new Promise(res => tileLayer.on('load', () => setTimeout(res, 1000)));
        }
    </script>
</body>
</html>
