<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #fff; }
        .buldre-tooltip { 
            padding: 2px 5px; font-size: 11px; font-weight: bold; 
            background: white; border: 1px solid #444; border-radius: 4px;
            white-space: nowrap;
        }
        
        /* Ensure no default Leaflet backgrounds on DivIcons */
        .leaflet-div-icon { background: transparent !important; border: none !important; }

        /* BASE ICON STYLES */
        .pin-marker {
            width: 20px; height: 20px; border-radius: 50% 50% 50% 0;
            position: absolute; left: 50%; top: 50%;
            margin: -20px 0 0 -10px; box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            transform: rotate(-45deg);
        }
        
        /* PARKING SPECIFIC */
        .parking-pin { background: #2D72D9; }
        .parking-pin:after {
            content: 'P'; color: white; font-family: sans-serif; font-weight: bold; font-size: 13px;
            position: absolute; transform: rotate(45deg); left: 6px; top: 3px;
        }

        /* ROCK/BOULDER SPECIFIC */
        .rock-pin { background: #444; }
        .rock-label {
            position: absolute; left: 24px; top: -18px; /* Offset text to the right and up */
            color: #333; font-family: sans-serif; font-weight: bold;
            white-space: nowrap; padding: 1px 3px; background: rgba(255,255,255,0.8);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        async function initMap(leaflet, dynamicFontSize) {
            const map = L.map('map', { zoomControl: false, attributionControl: false })
                         .setView(leaflet.defaultCenter, leaflet.defaultZoom);
            const group = L.featureGroup();
            
            (leaflet.markers || []).forEach(m => {
                let divContent = '';
                
                let size = [60, 30]; 

                if (m.iconType === 'PARKING') {
                    divContent = '<div class="pin-marker parking-pin"></div>';
                    size = [20, 20];
                } else if (m.iconType === 'ROCK') {
                    const html = m.label || ''; 
                    const style = `font-size: ${dynamicFontSize}px;`;
                    divContent = `<div class="pin-marker rock-pin"></div><div class="rock-label" style="${style}">${html}</div>`;
                }

                if (divContent) {
                    const anchor = (m.iconType === 'ROCK') ? [10, 20] : [10, 20];
                    const icon = L.divIcon({
                        html: divContent,
                        className: 'custom-div-icon',
                        iconSize: size,
                        iconAnchor: anchor
                    });
                    L.marker([m.lat, m.lng], { icon }).addTo(group);
                }
            });

            (leaflet.outlines || []).forEach(o => {
                if (o.polygonCoords) {
                    const coords = o.polygonCoords.split(';').map(c => c.split(',').map(Number));
                    L.polygon(coords, { color: '#3388ff', weight: 3, fillOpacity: 0.1 }).addTo(group);
                }
            });

            (leaflet.slopes || []).forEach(s => {
                const coords = s.slope.coordinates.map(c => [c.latitude, c.longitude]);
                const dist = s.slope.distance;
                if (coords.length > 1) {
                    const line = L.polyline(coords, { color: s.backgroundColor, weight: 5, opacity: 0.8 }).addTo(group);
                    if (dist > 0) {
                        const txt = dist > 1000 ? (dist / 1000).toFixed(1) + " km" : Math.round(dist) + " m";
                        line.bindTooltip(txt, { permanent: true, direction: 'center', className: 'buldre-tooltip' });
                    }
                }
            });

            group.addTo(map);
            if (group.getBounds().isValid()) map.fitBounds(group.getBounds().pad(0.12));

            const tileUrl = leaflet.showPhotoNotMap 
                ? 'https://waapi.webatlas.no/maptiles/tiles/webatlas-orto-newup/wa_grid/{z}/{x}/{y}.jpeg?api_key=b8e36d51-119a-423b-b156-d744d54123d5'
                : 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';

            const tileLayer = L.tileLayer(tileUrl).addTo(map);
            return new Promise(res => tileLayer.on('load', () => setTimeout(res, 1200)));
        }
    </script>
</body>
</html>
